name: schedule-app (MySQL + Healthchecks)

services:
  db:
    image: mysql:8.0
    container_name: schedule-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: schedule_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: schedule-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=mysql://root:root_pass@db:3306/schedule_db
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    command: npm run dev
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    # El comando inicializa la DB, ejecuta el seed directamente y arranca el server
    command: >
      sh -c "npx prisma generate && 
             npx prisma db push && 
             npx ts-node prisma/seed.ts && 
             npm run dev"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: schedule-frontend
    restart: unless-stopped
    init: true
    environment:
      VITE_API_URL: http://localhost:3001
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      backend:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mysql_data:
