name: schedule-app

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: schedule-backend
    restart: unless-stopped
    init: true
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    command: npm run dev
    ports:
      - "3001:3001"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks:
      - app_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: schedule-frontend
    restart: unless-stopped
    init: true
    environment:
      VITE_API_URL: http://localhost:3001
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:5173').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - app_net

volumes:
  backend_node_modules:
  frontend_node_modules:

networks:
  app_net:
    driver: bridge
