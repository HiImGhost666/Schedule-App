name: schedule-app

services:
  db:
    image: mysql:8.0
    container_name: schedule-db
    restart: unless-stopped
    networks:
      - schedule-network
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: schedule_db
    ports:
      - "13306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: schedule-backend
    restart: unless-stopped
    networks:
      - schedule-network
    environment:
      - DATABASE_URL=mysql://root:root_pass@db:3306/schedule_db
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    ports:
      - "13001:13001"
    depends_on:
      db:
        condition: service_healthy
    command: >
          sh -c "npm install &&
            npx prisma generate &&
             i=0; until npx prisma migrate deploy; do
             i=$$((i+1));
             if [ $$i -ge 30 ]; then
             echo 'Database not ready after 30 attempts';
             exit 1;
             fi;
             echo 'Waiting for database...';
             sleep 2;
             done &&
             npx ts-node prisma/seed.ts &&
             npm run dev"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:13001/api/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: schedule-frontend
    restart: unless-stopped
    networks:
      - schedule-network
    init: true
    environment:
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 15173
    ports:
      - "15173:15173"

volumes:
  mysql_data:
    driver: local
  backend_node_modules:
    driver: local
  frontend_node_modules:
    driver: local

networks:
  schedule-network:
    driver: bridge
